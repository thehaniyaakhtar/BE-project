<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup | Self-Optimizing Power Grid</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
  
  <style>
    body {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      font-family: "Poppins", sans-serif;
      color: white;
      text-align: center;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      width: 350px;
      max-width: 90%;
    }
    h2 {
      margin-bottom: 20px;
      font-size: 28px;
    }
    input {
      width: 80%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
    }
    button {
      background-color: #00c6ff;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
      font-size: 16px;
    }
    button:hover {
      background-color: #0072ff;
      transform: scale(1.05);
    }
    a {
      color: #00c6ff;
      text-decoration: none;
      font-weight: 500;
    }
    a:hover {
      text-decoration: underline;
    }
    .error {
      color: #ff4d4d;
      font-size: 14px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Create Account</h2>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <!-- FIXED: action + CSRF -->
    <form method="POST" action="{{ url_for('signup') }}" novalidate>
      <input type="text" name="username" placeholder="Username" required autocomplete="username"><br>
      <input type="password" name="password" placeholder="Password" required autocomplete="new-password"><br>
      <button type="submit">Signup</button>
    </form>

    <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    <p><a href="{{ url_for('home') }}">Back to Home</a></p>
  </div>
</body>
</html>
