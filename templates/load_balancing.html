<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save Electricity Bill - Mumbai Smart Energy</title>
  <style>
    body {background: #0f2027; color: #ddd; font-family: 'Segoe UI';}
    .container {max-width: 700px; margin: 40px auto; padding: 30px; background: rgba(255,255,255,0.1); border-radius: 15px;}
    input, select {width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; background: rgba(255,255,255,0.2); border: none; color: white;}
    button {width: 100%; padding: 16px; font-size: 1.3rem; background: #00ffcc; color: #0f2027; border: none; border-radius: 10px; font-weight: bold;}
    .result {margin-top: 25px; padding: 20px; border-radius: 12px; background: rgba(0,255,200,0.1); display: none;}
  </style>
</head>
<body>
<div class="container">
  <h2 class="text-center">⚡ How Much Can You Save This Month?</h2>
  <p class="text-center text-muted">Tell us about your usage → Get simple tips</p>

  <label>Average Daily Load (Roughly how much electricity you use daily)</label>
  <input type="number" id="load" value="35" placeholder="e.g. 35 kWh">

  <label>When do you use most electricity?</label>
  <select id="peak_time">
    <option value="evening">Evening (6-10 PM) - AC, Cooking, Lights</option>
    <option value="day">Daytime</option>
    <option value="night">Night time</option>
  </select>

  <button onclick="getAdvice()">Get Money-Saving Advice</button>

  <div id="result" class="result"></div>
</div>

<script>
async function getAdvice() {
  const data = {
    load_demand_kwh: parseFloat(document.getElementById('load').value)
  };

  const res = await fetch('/load-balancing', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  const result = await res.json();

  const div = document.getElementById('result');
  div.innerHTML = `
    <h3>💰 You can save ₹${result.Saving_Estimate_Rs} this month!</h3>
    <p><strong>Action:</strong> ${result.Recommendation}</p>
    <p><strong>Adjusted Load:</strong> ${result.Adjusted_Load_kWh} kWh</p>
    <p><strong>Overload Risk:</strong> ${result.Overload_Risk}</p>
  `;
  div.style.display = 'block';
}
</script>
</body>
</html>
