<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mumbai Smart Grid Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f2027; }
    #map { height: 100vh; width: 100%; }
    .info { padding: 6px 8px; font: 14px/16px Arial; background: white; border-radius: 4px; }
    .legend { line-height: 18px; color: #555; background: rgba(255,255,255,0.8); padding: 10px; border-radius: 5px; }
    .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.7; }
    .controls { position: absolute; top: 10px; right: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
    button { margin: 5px; padding: 8px 12px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-size: 14px; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Control Buttons -->
  <div class="controls">
    <button id="risk-toggle">Risk Layer</button>
    <button id="renewables-toggle">Renewables Layer</button>
    <button id="refresh-btn">Refresh (30s)</button>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="{{ url_for('static', filename='mumbai_zones.js') }}"></script>

  <script>
    // ========================================
    // Global Variables
    // ========================================
    let map, riskLayer, renewablesLayer;
    const riskColors = {0.3: '#00ff00', 0.4: '#ffff00', 0.6: '#ff8000', 0.7: '#ff0000'};

    // ========================================
    // Initialize Map
    // ========================================
    map = L.map('map').setView([19.0760, 72.8777], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    renewablesLayer = L.layerGroup();

    // ========================================
    // Load Risk Layer (GeoJSON)
    // ========================================
    fetch('/static/mumbai_zones.geojson')
      .then(r => r.json())
      .then(data => {
        riskLayer = L.geoJSON(data, {
          style: feature => ({
            color: riskColors[feature.properties.risk] || '#777',
            weight: 3,
            fillOpacity: 0.5
          })
        }).addTo(map);

        riskLayer.eachLayer(layer => {
          layer.on('click', e => showZoneAnalysis(e.layer.feature.properties.name));
        });
      })
      .catch(err => console.error('Failed to load GeoJSON:', err));

    // ========================================
    // Toggle Risk Layer
    // ========================================
    document.getElementById('risk-toggle').addEventListener('click', () => {
      if (map.hasLayer(riskLayer)) {
        map.removeLayer(riskLayer);
      } else {
        map.addLayer(riskLayer);
      }
    });

    // ========================================
    // Toggle Renewables Layer
    // ========================================
    document.getElementById('renewables-toggle').addEventListener('click', () => {
      if (renewablesLayer.getLayers().length === 0) {
        // Fetch data from backend
        fetch('/renewables-data')
          .then(r => r.json())
          .then(data => {
            if (renewablesLayer) map.removeLayer(renewablesLayer);
            renewablesLayer = L.layerGroup();

            data.forEach(d => {
              const color = d.pct > 20 ? '#2ed573' : d.pct > 10 ? '#ffa502' : '#ff4757';
              const radius = 8 + (d.pct / 5);

              L.circleMarker([d.lat, d.lng], {
                color: color,
                radius: radius,
                fillOpacity: 0.7
              })
              .bindPopup(`<b>${d.zone}</b><br>Renewables: ${d.pct}%`)
              .addTo(renewablesLayer);
            });

            renewablesLayer.addTo(map);
            console.log("Renewables layer loaded:", data);
          })
          .catch(err => {
            console.error("Renewables layer failed:", err);
            alert("Failed to load Renewables layer. Check console.");
          });
      } else {
        map.removeLayer(renewablesLayer);
        renewablesLayer.clearLayers();
      }
    });

    // ========================================
    // Show Zone Analysis Popup
    // ========================================
    async function showZoneAnalysis(zone) {
      const stats = await fetchZoneStats(zone);
  
      L.popup()
        .setLatLng(map.getCenter())
        .setContent(`
          <div style="font-size:15px; min-width:280px;">
            <h4>${zone}</h4>
            <p><strong>Blackout Risk:</strong> <span style="color:${stats.risk > 0.6 ? 'red' : 'orange'}">${stats.risk?.label || 'Medium'}</span></p>
            <p><strong>Renewables:</strong> ${stats.renewable}%</p>
            <p><strong>Transformer Load:</strong> ${stats.transformer}%</p>
            <hr>
            <strong>What should YOU do?</strong><br>
            ${stats.overload ? 
              '• Avoid using AC/Geyser between 7-10 PM<br>• Possible power cut tonight' : 
              '• Everything is normal in this area'}
          </div>
        `)
        .openOn(map);
    }

    async function fetchZoneStats(zone) {
      const resp = await fetch('/analyze-area', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ zone })
      });
      return resp.json();
    }

    // ========================================
    // AI Prediction
    // ========================================
    async function predictZone(zone) {
      const resp = await fetch('/dashboard', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          zone,
          load_demand_kwh: 50,
          temperature_c: 28,
          hour_of_day: 12
        })
      });
      const data = await resp.json();
      alert(
        `Zone: ${data.zone}\n` +
        `Risk: ${data.blackout.label} (${data.blackout.risk})\n` +
        `Suggested Action: ${data.recommendations.Suggested_Action.toFixed(4)}`
      );
    }

    // ========================================
    // Legend
    // ========================================
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = () => {
      const div = L.DomUtil.create('div', 'info legend');
      div.innerHTML = `
        <h4 style="margin:0 0 8px;">Risk Levels</h4>
        <i style="background:#00ff00"></i> Low (0.3)<br>
        <i style="background:#ffff00"></i> Low (0.4)<br>
        <i style="background:#ff8000"></i> High (0.6)<br>
        <i style="background:#ff0000"></i> High (0.7)
      `;
      return div;
    };
    legend.addTo(map);

    // ========================================
    // Refresh Button
    // ========================================
    document.getElementById('refresh-btn').addEventListener('click', () => {
      location.reload();
    });

    // Optional: Auto-refresh every 30s
    // setInterval(() => location.reload(), 30000);
  </script>
</body>
</html>
